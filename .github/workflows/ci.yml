name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      publish_images:
        description: Publish backend and frontend images to GHCR
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-coverage
          path: backend/coverage/

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monize_test
          POSTGRES_USER: monize_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: monize_test
      DATABASE_USER: monize_test
      DATABASE_PASSWORD: test_password
      JWT_SECRET: test-jwt-secret-for-ci-minimum-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: cd backend && npm ci && npm audit --audit-level=high
      - run: cd frontend && npm ci && npm audit --audit-level=high

  bearer-scan:
    name: Bearer Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bearer
        uses: bearer/bearer-action@v2
        with:
          # We explicitly don't provide HTTPS out-of-the-box since most users self-host in environments where HTTPS is terminated at a reverse proxy, and we provide guidance on how to securely configure this in our docs. 
          # We also have some known exception messages that contain payee names which would otherwise be flagged as potential secrets, but we have determined that the risk of these being exploited is low and the value of having the full exception message in our logs outweighs the risk.
          skip-rule: "javascript_lang_logger_leak,javascript_express_https_protocol_missing,javascript_lang_exception" 
          # Exclude some false positives and low-risk findings that we are aware of and have accepted for now. We can re-evaluate these over time to see if any should be remediated.
          # b65bd7b1a0585cd1d0a326cdb09ce40d_0 - Hard-coded secret used for demo site
          # da119900eefffd8b84e7693e0388568a_0 - Hard-coded secret used for E2E tests
          # 95857358158e4664c01c05441df9f2a9_0 - Hard-coded secret used for demo site
          # 842822dd22cd4403ab5800ac89480c0a_0 - Insufficient randomness for inconsequential task
          # aa2e6330aede1004652f740df19e1d86_0 - Insufficient randomness for inconsequential task
          exclude-fingerprint: "b65bd7b1a0585cd1d0a326cdb09ce40d_0,da119900eefffd8b84e7693e0388568a_0,95857358158e4664c01c05441df9f2a9_0,842822dd22cd4403ab5800ac89480c0a_0,aa2e6330aede1004652f740df19e1d86_0"

  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_images == 'true')
    needs:
      [
        backend-lint,
        backend-unit-tests,
        backend-integration-tests,
        frontend-lint,
        frontend-unit-tests,
        npm-audit,
      ]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare release metadata
        id: version
        run: |
          CURRENT=$(node -p "require('./backend/package.json').version")
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          BACKEND_IMAGE="ghcr.io/${OWNER}/monize-backend"
          FRONTEND_IMAGE="ghcr.io/${OWNER}/monize-frontend"
          REF_SLUG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//; s/-$//' | cut -c1-40)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "is_final_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Bumping version: $CURRENT -> $NEW_VERSION"
            cd backend  && npm version "$NEW_VERSION" --no-git-tag-version && cd ..
            cd frontend && npm version "$NEW_VERSION" --no-git-tag-version && cd ..
            BACKEND_TAGS=$(printf '%s\n%s\n' "${BACKEND_IMAGE}:latest" "${BACKEND_IMAGE}:${NEW_VERSION}")
            FRONTEND_TAGS=$(printf '%s\n%s\n' "${FRONTEND_IMAGE}:latest" "${FRONTEND_IMAGE}:${NEW_VERSION}")
          else
            PRERELEASE_VERSION="${CURRENT}-pre-${REF_SLUG}-${SHORT_SHA}"
            echo "is_final_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$PRERELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "Preparing prerelease images: $PRERELEASE_VERSION"
            BACKEND_TAGS=$(printf '%s\n%s\n' "${BACKEND_IMAGE}:prerelease-${REF_SLUG}" "${BACKEND_IMAGE}:${PRERELEASE_VERSION}")
            FRONTEND_TAGS=$(printf '%s\n%s\n' "${FRONTEND_IMAGE}:prerelease-${REF_SLUG}" "${FRONTEND_IMAGE}:${PRERELEASE_VERSION}")
          fi

          {
            echo "backend_tags<<EOF"
            echo "$BACKEND_TAGS"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "$FRONTEND_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build metadata
        id: meta
        run: |
          echo "git_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          tags: ${{ steps.version.outputs.backend_tags }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          tags: ${{ steps.version.outputs.frontend_tags }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump
        if: steps.version.outputs.is_final_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/package.json backend/package-lock.json frontend/package.json frontend/package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase
          git push

      - name: Create GitHub release
        if: steps.version.outputs.is_final_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

